<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- 5-pointed star points (outer tips) -->
  <!-- Top: (100, 10) -->
  <!-- Upper-right: (190, 75) -->
  <!-- Lower-right: (155, 175) -->
  <!-- Lower-left: (45, 175) -->
  <!-- Upper-left: (10, 75) -->

  <!-- Star outline: connect adjacent tips through inner intersections -->
  <polygon points="100,10 122,76 190,75 136,117 157,183 100,143 43,183 64,117 10,75 78,76"
           fill="none" stroke="white" stroke-width="3" stroke-linejoin="miter"/>

  <!-- Inner crossing lines connecting opposite tips -->
  <line x1="100" y1="10" x2="43" y2="183" stroke="white" stroke-width="2.2"/>
  <line x1="100" y1="10" x2="157" y2="183" stroke="white" stroke-width="2.2"/>
  <line x1="190" y1="75" x2="43" y2="183" stroke="white" stroke-width="2.2"/>
  <line x1="10" y1="75" x2="157" y2="183" stroke="white" stroke-width="2.2"/>
  <line x1="10" y1="75" x2="190" y2="75" stroke="white" stroke-width="2.2"/>
</svg>
