<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- 
    Analyzing the logo carefully:
    - Tall narrow top point
    - Wide left and right points (roughly at mid height)
    - Two bottom points angled downward
    - Inner lines create asymmetric sections (not a regular pentagram)
    
    Outer star points:
    Top:         (100, 8)
    Right:       (185, 105)
    Lower-right: (148, 188)
    Lower-left:  (52, 188)
    Left:        (15, 105)
  -->

  <!-- Outer star shape -->
  <polygon points="100,8 185,105 148,188 52,188 15,105"
           fill="none" stroke="white" stroke-width="3.5" stroke-linejoin="miter"/>

  <!-- Inner diagonal lines - creating the asymmetric internal pattern -->
  <!-- Top to lower-right -->
  <line x1="100" y1="8" x2="148" y2="188" stroke="white" stroke-width="3"/>
  <!-- Top to lower-left -->
  <line x1="100" y1="8" x2="52" y2="188" stroke="white" stroke-width="3"/>
  <!-- Left to right -->
  <line x1="15" y1="105" x2="185" y2="105" stroke="white" stroke-width="3"/>
  <!-- Left to lower-right -->
  <line x1="15" y1="105" x2="148" y2="188" stroke="white" stroke-width="3"/>
  <!-- Right to lower-left -->
  <line x1="185" y1="105" x2="52" y2="188" stroke="white" stroke-width="3"/>
</svg>
