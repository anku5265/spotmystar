<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer star boundary (5 points) -->
  <!-- Points: top(50,5), right(97,36), bottomRight(79,95), bottomLeft(21,95), left(3,36) -->
  <!-- Outer star outline -->
  <polygon
    points="50,5 97,36 79,95 21,95 3,36"
    fill="none"
    stroke="white"
    stroke-width="2.2"
    stroke-linejoin="miter"
  />
  <!-- Inner lines: each outer point connects to the two non-adjacent outer points (pentagram) -->
  <!-- top(50,5) to bottomRight(79,95) -->
  <line x1="50" y1="5" x2="79" y2="95" stroke="white" stroke-width="2.2"/>
  <!-- top(50,5) to bottomLeft(21,95) -->
  <line x1="50" y1="5" x2="21" y2="95" stroke="white" stroke-width="2.2"/>
  <!-- right(97,36) to bottomLeft(21,95) -->
  <line x1="97" y1="36" x2="21" y2="95" stroke="white" stroke-width="2.2"/>
  <!-- right(97,36) to left(3,36) -->
  <line x1="97" y1="36" x2="3" y2="36" stroke="white" stroke-width="2.2"/>
  <!-- bottomRight(79,95) to left(3,36) -->
  <line x1="79" y1="95" x2="3" y2="36" stroke="white" stroke-width="2.2"/>
</svg>
